# Auto-sync from upstream, build minimal armv7l Docker image
name: Sync Upstream + Build ARMv7l

on:
  schedule:
    # Check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: tashfeenahmed/freellmapi

jobs:
  check-and-build:
    name: Check upstream & build ARMv7l
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check upstream for new commits
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_SHA="${{ vars.LAST_UPSTREAM_SHA || '' }}"
          LATEST_SHA=$(gh api repos/$UPSTREAM_REPO/commits/main --jq '.sha')
          echo "Last known SHA: $LAST_SHA"
          echo "Latest SHA:     $LATEST_SHA"
          if [ "$LAST_SHA" = "$LATEST_SHA" ] && [ -n "$LAST_SHA" ]; then
            echo "No new commits. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New commits found!"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Clone upstream
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: upstream

      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push minimal ARM/v7 image
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          platforms: linux/arm/v7
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:armv7l
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:armv7l-latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update last-known SHA
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/variables" \
            --method POST \
            -f name=LAST_UPSTREAM_SHA \
            -f value="${{ steps.check.outputs.sha }}" 2>/dev/null \
            || gh api "repos/${{ github.repository }}/actions/variables" \
            --method PATCH \
            --header "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/variables/LAST_UPSTREAM_SHA" \
            -f name=LAST_UPSTREAM_SHA \
            -f value="${{ steps.check.outputs.sha }}"
