# Auto-sync from upstream, build minimal armv7l Docker image
name: Sync Upstream + Build ARMv7l

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: tashfeenahmed/freellmapi

jobs:
  check-and-build:
    name: Check upstream & build ARMv7l
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout fork (for Dockerfile.armv7l)
        uses: actions/checkout@v4
        with:
          path: infra

      - name: Check upstream for new commits
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_SHA="${{ vars.LAST_UPSTREAM_SHA || '' }}"
          LATEST_SHA=$(gh api repos/$UPSTREAM_REPO/commits/main --jq '.sha')
          echo "Last known SHA: $LAST_SHA"
          echo "Latest SHA:     $LATEST_SHA"
          if [ "$LAST_SHA" = "$LATEST_SHA" ] && [ -n "$LAST_SHA" ]; then
            echo "No new commits. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New upstream commit detected!"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Checkout upstream source
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: upstream

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.skip == 'false'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=armv7l,enable=true
            type=raw,value=armv7l-latest,enable=true
            type=sha,prefix=armv7l-,enable=true

      - name: Build and push ARMv7l image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./infra/Dockerfile.armv7l
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update last known SHA
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh variable set LAST_UPSTREAM_SHA --repo ${{ github.repository }} --body ${{ steps.check.outputs.sha }}
          echo "Updated LAST_UPSTREAM_SHA to ${{ steps.check.outputs.sha }}"
